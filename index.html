<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS-Scratch Engine</title>
  <script>
  window.addEventListener('error', function(e) {
    var errorDiv = document.getElementById('ipad-debug-console');
    if (!errorDiv) {
      errorDiv = document.createElement('div');
      errorDiv.id = 'ipad-debug-console';
      errorDiv.style = 'position:fixed; bottom:0; left:0; width:100%; max-height:150px; background:rgba(244,67,54,0.95); color:white; font-family:monospace; font-size:11px; padding:10px; overflow-y:auto; z-index:999999; box-sizing:border-box; border-top:2px solid #fff;';
      document.body.appendChild(errorDiv);
    }
    errorDiv.innerHTML += '<div>❌ ' + e.message + ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')</div>';
  });
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; background: #121212; color: #e0e0e0; }
    #sidebar { width: 250px; background: #1e1e1e; color: #fff; display: flex; flex-direction: column; border-right: 2px solid #2d2d2d; }
    .section-header { padding: 12px 15px; background: #252526; font-weight: bold; border-bottom: 1px solid #2d2d2d; font-size: 12px; letter-spacing: 1px; color: #aaaaaa; display: flex; justify-content: space-between; align-items: center; }
    
    /* ボタンの見た目をちょっとリッチに */
    .btn-add { background: #333; color: #ccc; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
    .btn-add:hover { background: #4caf50; color: white; border-color: #4caf50; }
    
    .file-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; }
    .file-item { padding: 10px 15px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #252526; display: flex; align-items: center; gap: 8px; color: #cccccc; transition: background 0.15s; }
    .file-item:hover { background: #2a2a2a; color: #fff; }
    .file-item.active { background: #2d2d2d; color: #4fc1ff; font-weight: bold; border-left: 3px solid #007acc; padding-left: 12px; }
    .empty-msg { padding: 15px; color: #555; font-size: 12px; font-style: italic; display: flex; align-items: center; gap: 6px; }
    
    #editor-panel { flex-grow: 1; display: flex; flex-direction: column; background: #1e1e1e; }
    .panel-header { padding: 10px 15px; background: #2d2d2d; color: #aaa; font-size: 12px; border-bottom: 1px solid #252526; display: flex; align-items: center; gap: 6px; }
    
    #code-input { flex-grow: 1; width: 100%; height: 100%; border: none; outline: none; }
    
    #drag-bar { width: 6px; background: #2d2d2d; cursor: col-resize; transition: background 0.2s; }
    #drag-bar:hover { background: #007acc; }
    
    #game-panel { width: 450px; background: #181818; display: flex; flex-direction: column; border-left: 2px solid #2d2d2d; }
    .toolbar { padding: 10px; background: #222; display: flex; gap: 10px; border-bottom: 1px solid #2d2d2d; align-items: center; }
    
    /* ツールバーのボタンもリッチ化 */
    .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    #run-btn { background: #4caf50; color: white; }
    #stop-btn { background: #f44336; color: white; }
    #export-btn { background: #008cba; color: white; margin-left: auto; }
    .canvas-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
    canvas { background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.6); border-radius: 4px; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  <script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
  </script>
</head>
<body>

  <div id="sidebar">
    <div class="section-header">
      <span>SCRIPTS</span>
      <button id="add-script-btn" class="btn-add"><i class="fas fa-plus"></i></button>
    </div>
    <ul id="script-list" class="file-list">
      <li class="file-item active" data-filepath="script/game.js">
        <i class="fas fa-file-code" style="color: #cbd5e1;"></i> game.js
      </li>
    </ul>
    
    <div class="section-header">
      <span>COSTUMES</span>
      <button id="add-costume-btn" class="btn-add"><i class="fas fa-plus"></i></button>
    </div>
    <ul id="costume-list" class="file-list">
      <div class="empty-msg"><i class="fas fa-image"></i> No costumes</div>
    </ul>
    
    <div class="section-header">
      <span>SOUNDS</span>
      <button id="add-sound-btn" class="btn-add"><i class="fas fa-plus"></i></button>
    </div>
    <ul id="sound-list" class="file-list">
      <div class="empty-msg"><i class="fas fa-volume-high"></i> No sounds</div>
    </ul>
  </div>

  <div id="editor-panel">
    <div class="panel-header"><i class="fas fa-pen"></i> <span id="current-path-text">editor / script/game.js</span></div>
    <div id="code-input"></div>
  </div>

  <div id="drag-bar"></div>

  <div id="game-panel">
    <div class="toolbar">
      <button id="run-btn" class="btn"><i class="fas fa-play"></i> 実行</button>
      <button id="stop-btn" class="btn"><i class="fas fa-stop"></i> 停止</button>
      <button id="export-btn" class="btn"><i class="fas fa-box-open"></i> ZIP保存</button>
    </div>
    <div class="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <script type="module" src="_main.js"></script>
</body>
</html>
